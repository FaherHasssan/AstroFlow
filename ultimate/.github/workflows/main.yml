name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Replace with specific destination container registry if needed
  IMAGE_NAME: ${{ github.repository }}/ultimate-backend

jobs:
  test-and-validate:
    name: Code Testing & Validation Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Dependencies & Testing Engines
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort safety pytest pytest-asyncio httpx pytest-cov pytest-mock respx

      - name: Enforce Strict Code Formatting (Black & Isort)
        run: |
          black --check .
          isort --check-only --profile black .

      - name: Static Dependency Vulnerability Scan (Safety Check)
        run: |
          # Fails the build if any open source dependency in requirements.txt has known CVEs
          safety check -r requirements.txt --full-report

      - name: Execute Automated Test Suite & Coverage Floor Gate
        run: |
          # Strictly enforces the mandatory 90% test coverage floor. 
          # Fails the entire CI/CD pipeline if test_budget_breaker.py fails 
          # or if coverage falls below 90%.
          pytest -v --asyncio-mode=auto --cov=app --cov-report=term-missing --cov-fail-under=90


  security-sast:
    name: Static Application Security Testing (SAST)
    runs-on: ubuntu-latest
    needs: test-and-validate
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit Security Analyzer
        run: pip install bandit

      - name: Run Bandit Vulnerability Scan
        run: |
          # Executes a deep security code review scanning for shell injections, 
          # hardcoded keys, and unsafe configurations natively within Python AST.
          bandit -r ./app -lll


  container-compilation:
    name: Secure Container Compilation & Delivery
    runs-on: ubuntu-latest
    needs: [test-and-validate, security-sast]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Multi-Architecture Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Secure Container Storage Repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Utilizing encrypted GitHub Repository Secrets for secure authentication
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Dynamic Tags and Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build Isolated Container Image (Local Scan Cache)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: local-scan-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Deep Container Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-scan-image:latest'
          format: 'table'
          # Force pipeline failure (exit-code 1) if CRITICAL or HIGH vulnerabilities 
          # are discovered within OS packages or compiled image layers.
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Execute Secure Push to Production Registry
        # Only deploy images to storage if the active push is on the main master branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
