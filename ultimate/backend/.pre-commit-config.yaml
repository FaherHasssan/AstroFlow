# fail_fast: true halts execution on the first failure to speed up the loop
fail_fast: false

repos:
  # Base hooks for fundamental syntax and file validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace         # Trims trailing whitespace
      - id: end-of-file-fixer           # Ensures files end in a newline
      - id: check-yaml                  # Validates YAML syntax across configuration files
      - id: check-added-large-files     # Prevents committing large binary files accidentally
      - id: debug-statements            # Checks for rogue debugger imports (e.g., pdb) that shouldn't reach production
      - id: check-ast                   # Validates Python syntax to ensure the AST parses correctly

  # Strict auto-formatting via 'black' (the uncompromising Python code formatter)
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12
        args: ["--line-length=88"]      # Enforce standard 88-character line length

  # Import sorting via 'isort' to maintain consistent import blocks
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black"]       # Ensures compatibility with Black formatting (prevents format loop fights)

  # Security scanning using 'bandit' to detect common security issues in Python code
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "."]  # Recursively scan the directory
        additional_dependencies: ["bandit[toml]"]  # Add TOML support for pyproject.toml configuration
