user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Hide Nginx version for security posture
    server_tokens off;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Maximum payload transfer caps (blocks large file uploads / DDoS via huge bodies)
    client_max_body_size 2M;
    client_body_buffer_size 256k;
    
    # Strictly define tenant-based rate limiting zone
    # Tracks the x-tenant-id header. Allocates 10MB of memory for the state table, 
    # and strictly caps sustained request rates to 5 requests per second per tenant.
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=5r/s;
    
    # General IP-based rate limit for unauthenticated brute-force attacks
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=10r/s;

    upstream fastapi_backend {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name api.ultimate360.ae;

        # Redirect all HTTP traffic to HTTPS securely
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.ultimate360.ae;

        # Modern TLS 1.3 Protocol Standards
        ssl_protocols TLSv1.3 TLSv1.2;
        ssl_prefer_server_ciphers off;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # SSL Certificates (Assumes volumes are mapped securely from Let's Encrypt / Certbot)
        ssl_certificate /etc/letsencrypt/live/api.ultimate360.ae/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ultimate360.ae/privkey.pem;

        # Security Posture Response Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            # Enforce the defined rate limiting zones (burst thresholds allow slight traffic spikes)
            limit_req zone=tenant_limit burst=10 nodelay;
            limit_req zone=ip_limit burst=20 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Explicit Pipeline Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
